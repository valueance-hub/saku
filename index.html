<script>
(function(){

  function init(){
    if ((((navigator.maxTouchPoints||0) > 0) || ((window.innerWidth||999) <= 1024))) return;
    var NS='http://www.w3.org/2000/svg';
    if (document.getElementById('sakuLiving')) return;
    var svg=document.createElementNS(NS,'svg');
    svg.setAttribute('aria-hidden','true');
    svg.style.cssText='position:absolute;width:0;height:0;pointer-events:none;';
    var f=document.createElementNS(NS,'filter');
    f.setAttribute('id','sakuLiving');
    f.setAttribute('x','-12%'); f.setAttribute('y','-12%');
    f.setAttribute('width','124%'); f.setAttribute('height','124%');
    f.setAttribute('color-interpolation-filters','sRGB');
    var t=document.createElementNS(NS,'feTurbulence');
    t.setAttribute('type','fractalNoise');
    t.setAttribute('baseFrequency','0.007 0.012');
    t.setAttribute('numOctaves','2');
    t.setAttribute('seed','7');
    t.setAttribute('result','n');
    var d=document.createElementNS(NS,'feDisplacementMap');
    d.setAttribute('in','SourceGraphic');
    d.setAttribute('in2','n');
    d.setAttribute('scale','12');
    d.setAttribute('xChannelSelector','R');
    d.setAttribute('yChannelSelector','G');
    f.appendChild(t); f.appendChild(d); svg.appendChild(f);
    document.body.appendChild(svg);
    var start=performance.now(), last=0;
    function loop(now){
      if(now-last>33){
        last=now;
        var e=now-start;
        var fx=(0.0072+0.0016*Math.sin(e/9000)).toFixed(5);
        var fy=(0.0122+0.0024*Math.sin(e/7000+1.3)).toFixed(5);
        t.setAttribute('baseFrequency', fx+' '+fy);
        d.setAttribute('scale', (11+2*Math.sin(e/6000)).toFixed(2));
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }
  if (document.body) init();
  else document.addEventListener('DOMContentLoaded', init);
})();

      <div style="width:64px; height:1px; background:rgba(255,255,255,.32); margin-top:28px; transform-origin:left; animation:sakuRule 1.2s cubic-bezier(.2,.7,.2,1) .7s both;"></div>

<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 820 },
  &quot;bgOpacity&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 0.92, &quot;min&quot;: 0, &quot;max&quot;: 1, &quot;step&quot;: 0.02, &quot;tsType&quot;: &quot;number&quot; },
  &quot;monochrome&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  state = { email: '', pass: '', focused: null, err: '' };

  fieldStyle(active) {
    const base = {
      position: 'absolute', left: '0', textAlign: 'left',
      pointerEvents: 'none', fontFamily: "'Satoshi',sans-serif",
      transition: 'all .55s cubic-bezier(.2,.7,.2,1)'
    };
    return active
      ? { ...base, top: '-14px', fontSize: '10px', letterSpacing: '.28em', textTransform: 'uppercase', color: 'rgba(255,255,255,.72)' }
      : { ...base, top: '20px', fontSize: '16px', letterSpacing: '.02em', textTransform: 'none', color: 'rgba(255,255,255,.5)' };
  }

  ripple(e) {
    const b = e.currentTarget;
    const rect = b.getBoundingClientRect();
    const d = Math.max(rect.width, rect.height) * 1.1;
    const s = document.createElement('span');
    s.style.cssText = 'position:absolute;border-radius:50%;background:rgba(255,255,255,.22);pointer-events:none;'
      + 'width:' + d + 'px;height:' + d + 'px;'
      + 'left:' + (e.clientX - rect.left - d / 2) + 'px;'
      + 'top:' + (e.clientY - rect.top - d / 2) + 'px;'
      + 'transform:scale(0);opacity:.7;'
      + 'transition:transform .75s cubic-bezier(.2,.7,.2,1),opacity .75s ease;';
    b.appendChild(s);
    requestAnimationFrame(() => { s.style.transform = 'scale(2.6)'; s.style.opacity = '0'; });
    setTimeout(() => s.remove(), 800);
  }

  btnEnter(e) {
    var b = e.currentTarget;
    if (b.children[0]) b.children[0].style.transform = 'scaleX(1)';
    var tx = b.children[1];
    if (tx) { tx.style.color = '#0a0a0b'; tx.style.letterSpacing = '.42em'; if (tx.lastElementChild) tx.lastElementChild.style.transform = 'translateX(7px)'; }
  }

  btnLeave(e) {
    var b = e.currentTarget;
    if (b.children[0]) b.children[0].style.transform = 'scaleX(0)';
    var tx = b.children[1];
    if (tx) { tx.style.color = '#ffffff'; tx.style.letterSpacing = '.34em'; if (tx.lastElementChild) tx.lastElementChild.style.transform = 'translateX(0)'; }
  }

  enterDojo(e) {
    this.ripple(e);
    var self=this, sb=window.sakuSB;
    if(!sb){ setTimeout(function () { window.location.href = 'dashboard.html'; }, 540); return; }
    if(!self.state.email || !self.state.pass){ self.setState({ err:'enter your email and passcode' }); return; }
    self.setState({ err:'' });
    sb.auth.signInWithPassword({ email:self.state.email, password:self.state.pass }).then(function(res){
      if(res.error){ self.setState({ err:res.error.message }); }
      else { window.location.href = 'dashboard.html'; }
    });
  }
  createAccount(e) {
    if(e&&e.preventDefault) e.preventDefault();
    var self=this, sb=window.sakuSB;
    if(!sb){ self.setState({ err:'supabase not connected yet — see the setup guide' }); return; }
    if(!self.state.email || !self.state.pass){ self.setState({ err:'enter an email and a passcode (min 6 chars)' }); return; }
    self.setState({ err:'' });
    sb.auth.signUp({ email:self.state.email, password:self.state.pass }).then(function(res){
      if(res.error){ self.setState({ err:res.error.message }); }
      else { var sess=res.data && res.data.session; if(sess){ window.location.href = 'dashboard.html'; } else { self.setState({ err:'account created — check your email to confirm, then enter' }); } }
    });
  }

  spawnParticles() {
    const host = this.host;
    if (!host || host.dataset.seeded) return;
    host.dataset.seeded = '1';
    const N = (((navigator.maxTouchPoints||0) > 0) || ((window.innerWidth||999) <= 1024)) ? 22 : 220;
    for (let i = 0; i < N; i++) {
      const big = Math.random() < 0.18;
      const size = big ? (3 + Math.random() * 3.5) : (0.6 + Math.random() * 2);
      const p = document.createElement('div');
      p.style.cssText = 'position:absolute;border-radius:50%;'
        + 'background:rgba(255,255,255,' + (0.22 + Math.random() * 0.5) + ');'
        + 'width:' + size + 'px;height:' + size + 'px;'
        + 'left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;'
        + 'filter:blur(' + (big ? 1.2 : Math.random() * 0.7) + 'px);';
      host.appendChild(p);
      const dx = 40 + Math.random() * 240;     // wind drifts right
      const dy = -(60 + Math.random() * 300);   // and lifts up
      const sway = (Math.random() - 0.5) * 75;
      const dur = 4600 + Math.random() * 7000;
      const peak = 0.35 + Math.random() * 0.5;
      p.animate([
        { transform: 'translate(0px,0px)', opacity: 0 },
        { opacity: peak, offset: 0.14 },
        { transform: 'translate(' + (dx * 0.5 + sway) + 'px,' + (dy * 0.5) + 'px)', offset: 0.55 },
        { opacity: peak, offset: 0.82 },
        { transform: 'translate(' + dx + 'px,' + dy + 'px)', opacity: 0 }
      ], { duration: dur, delay: -Math.random() * dur, iterations: Infinity, easing: 'ease-in-out' });
    }
  }

  componentDidMount() { this.spawnParticles(); this.injectLiving(); }

  setupVideo() {
    try {
      // PING-PONG: forward (native, smooth) then reverse back to 0, repeat. No jump-cut.
      var v = document.getElementById('sakuVidA');
      var B = document.getElementById('sakuVidB');
      if (B) B.style.display = 'none';
      if (!v) return;
      v.muted = true; v.playsInline = true; v.loop = false;
      var EDGE = 0.08;            // switch this far from the end
      var reversing = false, lastT = 0;
      var safePlay = function () { var p = v.play(); if (p && p.catch) p.catch(function () {}); };

      var reverseStep = function () {
        if (!reversing) return;
        var now = performance.now();
        var dt = (now - lastT) / 1000; lastT = now;
        var nt = v.currentTime - dt;        // ~1x reverse
        if (nt <= 0) { try { v.currentTime = 0; } catch (e) {} reversing = false; safePlay(); return; }
        try { v.currentTime = nt; } catch (e) {}
        requestAnimationFrame(reverseStep);
      };
      var startReverse = function () {
        if (reversing) return;
        reversing = true; v.pause(); lastT = performance.now();
        requestAnimationFrame(reverseStep);
      };

      var fwdWatch = function () {
        if (!reversing && v.duration && isFinite(v.duration) && v.currentTime >= v.duration - EDGE) startReverse();
        requestAnimationFrame(fwdWatch);
      };
      v.addEventListener('ended', function () { if (!reversing) startReverse(); });
      if (v.readyState >= 2) safePlay(); else v.addEventListener('loadeddata', safePlay, { once: true });
      document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'visible' && !reversing) safePlay(); });
      requestAnimationFrame(fwdWatch);
    } catch (e) {}
  }

  injectLiving() {
    try {
      var NS = 'http://www.w3.org/2000/svg';
      var doc = document;
      if ((((navigator.maxTouchPoints||0) > 0) || ((window.innerWidth||999) <= 1024))) { var imL = doc.querySelector('img'); if (imL) imL.style.filter = 'grayscale(1) contrast(1.05) brightness(.98)'; return; }
      if (!doc.getElementById('sakuLiving')) {
        var svg = doc.createElementNS(NS, 'svg');
        svg.setAttribute('aria-hidden', 'true');
        svg.style.cssText = 'position:absolute;width:0;height:0;pointer-events:none;';
        var f = doc.createElementNS(NS, 'filter');
        f.setAttribute('id', 'sakuLiving');
        f.setAttribute('x', '-12%'); f.setAttribute('y', '-12%');
        f.setAttribute('width', '124%'); f.setAttribute('height', '124%');
        f.setAttribute('color-interpolation-filters', 'sRGB');
        var t = doc.createElementNS(NS, 'feTurbulence');
        t.setAttribute('type', 'fractalNoise');
        t.setAttribute('baseFrequency', '0.007 0.012');
        t.setAttribute('numOctaves', '2'); t.setAttribute('seed', '7'); t.setAttribute('result', 'n');
        var d = doc.createElementNS(NS, 'feDisplacementMap');
        d.setAttribute('in', 'SourceGraphic'); d.setAttribute('in2', 'n');
        d.setAttribute('scale', '62'); d.setAttribute('xChannelSelector', 'R'); d.setAttribute('yChannelSelector', 'G');
        f.appendChild(t); f.appendChild(d); svg.appendChild(f); doc.body.appendChild(svg);
        var start = performance.now(), last = 0;
        var loop = function (now) {
          if (now - last > 33) {
            last = now; var e = now - start;
            t.setAttribute('baseFrequency', (0.0088 + 0.0044 * Math.sin(e / 3400)).toFixed(5) + ' ' + (0.0150 + 0.0062 * Math.sin(e / 2900 + 1.3)).toFixed(5));
            d.setAttribute('scale', (60 + 22 * Math.sin(e / 2300)).toFixed(2));
          }
          requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }
      var img = doc.querySelector('img');
      if (img) {
        var mono = this.props.monochrome ?? true;
        img.style.filter = (mono ? 'grayscale(1) contrast(1.08) brightness(0.96) ' : '') + 'url(#sakuLiving)';
      }
    } catch (err) {}
  }

  renderVals() {
    const emailActive = this.state.focused === 'email' || this.state.email.length > 0;
    const passActive = this.state.focused === 'pass' || this.state.pass.length > 0;
    const mono = this.props.monochrome ?? true;
    return {
      email: this.state.email,
      pass: this.state.pass,
      setEmail: (e) => this.setState({ email: e.target.value }),
      setPass: (e) => this.setState({ pass: e.target.value }),
      focusEmail: () => this.setState({ focused: 'email' }),
      focusPass: () => this.setState({ focused: 'pass' }),
      blurField: () => this.setState({ focused: null }),
      emailLabelStyle: this.fieldStyle(emailActive),
      passLabelStyle: this.fieldStyle(passActive),
      ripple: (e) => this.ripple(e),
      btnEnter: (e) => this.btnEnter(e),
      btnLeave: (e) => this.btnLeave(e),
      enterDojo: (e) => this.enterDojo(e),
      createAccount: (e) => this.createAccount(e),
      err: this.state.err,
      errStyle: this.state.err ? { marginTop:'16px', fontSize:'12px', color:'#e6a3a3', letterSpacing:'.02em', fontFamily:"'Satoshi'" } : { display:'none' },
      particleHost: (el) => { this.host = el; if (el) this.spawnParticles(); },
      bgOpacity: this.props.bgOpacity ?? 1,
      bgFilter: mono ? 'grayscale(1) contrast(1.1) brightness(0.99)' : ''
    };
  }
}
